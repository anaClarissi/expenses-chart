<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <meta name="description" content="Expenses Char Website">
  <meta name="keywords" content="html, css, javascript">
  <meta name="author" content="Ana Clarissi">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" sizes="32x32" href="./src/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Expenses chart component</title>

  <link rel="stylesheet" href="./src/css/style.css">
  
</head>
<body>

  <main id="main">

    <div class="container">

      <div id="header">

        <div class="header-content">

          <h1>My balance</h1>

          <span>$921.48</span>

        </div>

        <div class="logo-area">

          <img src="src/images/logo.svg" alt="Logo" aria-hidden="true" id="logo">

        </div>

      </div>

      <div class="content">

        <h2>Spending - Last 7 days</h2>

        <div class="days-week">

          <span>mon</span>
          <span>tue</span>
          <span>wed</span>
          <span>thu</span>
          <span>fri</span>
          <span>sat</span>
          <span>sun</span>
          
        </div>

        <div class="content-results">

          <div class="result-this-month">

            <h3>Total this month</h3>
            
            <span>$478.33</span>

          </div>

          <div class="result-last-month">

            <span>+2.4%</span>

            <h3>from last month</h3>

          </div>

        </div>

      </div>

    </div>

  </main>

  <script src="./src/js/script.js"></script>

</body>
</html>
